# Общие настройки конфигурации
status = warn
name = hippodrome

# Объявление аппендеров
appenders = rolling

# Настройка RollingFile аппендера
appender.rolling.type = RollingFile
appender.rolling.name = FileLogger
appender.rolling.fileName = logs/hippodrome.log
appender.rolling.filePattern = logs/hippodrome.%d{yyyy-MM-dd}.log

# Настройка разметки (Layout)
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5level %c{1}: %msg%n

# Политика ротации (Policies)
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1

# Стратегия удаления старых логов (DefaultRolloverStrategy)
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.action.type = Delete
appender.rolling.strategy.action.basePath = logs
appender.rolling.strategy.action.maxDepth = 1

# Условия удаления (IfFileName и IfLastModified)
appender.rolling.strategy.action.condition.type = IfFileName
appender.rolling.strategy.action.condition.glob = hippodrome.*.log
appender.rolling.strategy.action.condition.nested_condition.type = IfLastModified
appender.rolling.strategy.action.condition.nested_condition.age = 7d

# Настройка корневого логгера (Root Logger)
rootLogger.level = debug
rootLogger.appenderRef.file.ref = FileLogger